paper:
  manuscript_repo: "git@github.com:atomashevic/voat-simulation-paper.git"
  title: "Towards Operational Validation of LLM-Agent Social Simulations: A Replicated Study of a Voat-like Technology Forum"

data:
  source_dataset:
    name: "MADOC"
    community: "Voat v/technology"
    note: "Raw parquet windows retained locally in this repository."
  calibration_windows:
    retained_root: "data/voat_windows/calibration"
    count: 10
    provenance: "Copied from MADOC/voat-technology-backup-10samples because this bundle matches the reported calibration table."
  validation_windows:
    retained_root: "data/voat_windows/validation"
    count: 30
    provenance: "Copied from MADOC/voat-technology-nonoverlap with sample_2..31 remapped to window_01..window_30."
  combined_parquets:
    retained_root: "data/voat_windows/combined"
    files:
      - "voat_technology_madoc.parquet"
      - "voat_technology_madoc_7d.parquet"
    note: "Retained because several legacy public pipelines use the compact combined Voat corpus directly."
  url_catalog:
    retained_path: "data/url_catalog/voat_external_urls.csv"
    note: "Voat URL catalog used for link seeding."

