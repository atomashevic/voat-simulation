sensitivity_runs:
  retained_root: "data/sensitivity_runs"
  authority: "server_db_only"
  conditions:
    c0: "baseline"
    c1: "neutral_persona"
    c2: "no_politics_persona"
    c3: "temperature_low_0_3"
    c4: "temperature_high_0_9"
    c5: "budget_flat_s1_5"
    c6: "budget_steep_s3_5"
    c7: "comment_to_post_low_2_to_1"
    c8: "comment_to_post_high_50_to_1"
    c9: "churn_low"
    c10: "churn_high"
  runs_per_condition: 10

external_code:
