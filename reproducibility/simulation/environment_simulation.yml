# YSocial Simulation Environment
# Conda environment for running LLM agent simulations
# Usage: conda env create -f environment_simulation.yml

name: ysocial-simulation
channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.12
  - numpy=2.1.3
  - networkx=3.4
  - nltk=3.9
  - pip
  - pip:
    # Web framework
    - Flask==2.1.2
    - Flask-Login==0.6.1
    - Flask-SQLAlchemy==2.5.1
    - Flask-WTF==1.2.2
    - Werkzeug==2.1.2
    - WTForms==2.3.3
    # Database
    - SQLAlchemy==1.4.31
    - SQLAlchemy-Utils==0.41.2
    # LLM inference
    - ollama==0.5.1
    - pyautogen==0.8.1
    # Agent generation
    - Faker==36.1.1
    # Content fetching
    - feedparser==6.0.11
    - requests==2.32.3
    - beautifulsoup4==4.13.3
    # Security
    - cryptography==37.0.2
    - pyOpenSSL==22.0.0
    # Validation
    - email_validator==2.2.0
    # Utilities
    - tqdm==4.67.1
    - pillow==11.1.0
    - pydantic==2.10.6

